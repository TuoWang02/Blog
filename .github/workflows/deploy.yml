name: Deploy Quartz site to GitHub Pages

on:
  push:
    branches:
      - main
  repository_dispatch:
    types:
      - knowledge-updated
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-22.04
    env:
      KNOWLEDGE_REPO_TOKEN: ${{ secrets.KNOWLEDGE_REPO_TOKEN }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Remove bundled content
        run: rm -rf content
      - name: Check knowledge repo token
        if: env.KNOWLEDGE_REPO_TOKEN == ''
        run: |
          echo "Missing KNOWLEDGE_REPO_TOKEN secret. Create a fine-grained GitHub token with Contents read access to TuoWang02/Self-Knowledge, then add it to the Blog repository's Actions secrets."
          exit 1
      - name: Checkout knowledge vault as Quartz content
        uses: actions/checkout@v4
        with:
          repository: TuoWang02/Self-Knowledge
          ref: ${{ github.event.client_payload.source_branch || 'main' }}
          path: content
          token: ${{ secrets.KNOWLEDGE_REPO_TOKEN }}
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Install Dependencies
        run: npm ci
      - name: Build Quartz
        run: npx quartz build
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: public

  deploy:
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
